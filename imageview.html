<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JSON Carousel with Thumbnails</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem 4rem 1rem; /* Extra bottom padding for thumbs */
      box-sizing: border-box;
    }

    .controls {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #333;
      color: #eee;
      border: none;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.95rem;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #555;
    }

    .status {
      font-size: 0.85rem;
      color: #ccc;
      min-height: 1.2em;
    }

    .carousel {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 900px;
      width: 100%;
      justify-content: center;
      margin: 0 auto 2rem auto; /* Space above thumbs */
      flex: 1; /* Takes available space */
    }

    .nav-btn {
      font-size: 1.2rem;
      padding-inline: 0.9rem;
    }

    .slides {
      width: 900px;
      max-width: 90vw;
      height: 700px;
      max-height: 70vh;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }

    .slide.active {
      opacity: 1;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain; /* full image scales proportionally */
    }

    .caption {
      background: rgba(0, 0, 0, 0.6);
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
    }

    .thumbs-wrapper {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      max-width: 900px;
      width: calc(100% - 2rem);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      z-index: 10;
    }

    .thumbs-nav-btn {
      font-size: 1rem;
      padding-inline: 0.6rem;
    }

    .thumbs-container {
      overflow: hidden;
      flex: 1 1 auto;
      height: 80px; /* Fixed height for grab space */
      cursor: grab;
    }
    
    .thumbs-track {
      display: flex;
      gap: 0.4rem;
      padding-block: 0.2rem 2rem; /* Extra space below thumbs for grabbing */
      transition: transform 0.2s ease;
      height: 100%;
    }

    .thumb {
      flex: 0 0 auto;
      width: 80px;
      height: 60px;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
    }
    
    .thumb img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain; /* Natural proportions */
    }

    .thumb.active {
      border-color: #f5c542;
    }

    .info {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #ccc;
      max-width: 900px;
      text-align: center;
    }

    @media (max-width: 700px) {
      body {
        padding: 1rem 1rem 3rem 1rem;
      }
    
      .slides {
        width: 90vw;
        height: 60vh; /* Bigger on mobile too */
      }
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="loadJson">Load gallery/button>
    <span class="status" id="status"></span>
  </div>

  <div class="carousel">
    <button id="prev" class="nav-btn" aria-label="Previous image">?</button>
    <div id="slides" class="slides"></div>
    <button id="next" class="nav-btn" aria-label="Next image">?</button>
  </div>

  <div class="thumbs-wrapper">
    <button id="thumbPrev" class="thumbs-nav-btn" aria-label="Scroll thumbnails left">?</button>
    <div class="thumbs-container">
      <div id="thumbTrack" class="thumbs-track"></div>
    </div>
    <button id="thumbNext" class="thumbs-nav-btn" aria-label="Scroll thumbnails right">?</button>
  </div>

<script>
  const slidesContainer = document.getElementById('slides');
  const statusEl = document.getElementById('status');
  const prevBtn = document.getElementById('prev');
  const nextBtn = document.getElementById('next');
  const loadBtn = document.getElementById('loadJson');

  const thumbTrack = document.getElementById('thumbTrack');
  const thumbPrevBtn = document.getElementById('thumbPrev');
  const thumbNextBtn = document.getElementById('thumbNext');
  const thumbsContainer = document.querySelector('.thumbs-container');

  let slides = [];
  let thumbs = [];
  let current = 0;
  let thumbOffset = 0;

  // init drag
  let isDragging = false;
  let startX = 0;
  let startOffset = 0;
  let wheelTimeout = null;

  function clearAll() {
    slidesContainer.innerHTML = '';
    thumbTrack.innerHTML = '';
    slides = [];
    thumbs = [];
    current = 0;
    thumbOffset = 0;
    thumbTrack.style.transform = 'translateX(0px)';
  }

  function buildUI(data) {
    clearAll();

    data.forEach((item, index) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      if (index === 0) slide.classList.add('active');

      const img = document.createElement('img');
      img.src = item.href;
      img.alt = item.description || item.name || '';

      const caption = document.createElement('div');
      caption.className = 'caption';
      caption.textContent = item.description || item.name || '';

      slide.appendChild(img);
      slide.appendChild(caption);
      slidesContainer.appendChild(slide);

      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      if (index === 0) thumb.classList.add('active');

      const tImg = document.createElement('img');
      tImg.src = item.href;
      tImg.alt = item.description || item.name || '';

      thumb.appendChild(tImg);
      thumbTrack.appendChild(thumb);

      thumb.addEventListener('click', (e) => {
        if (isDragging) {
          e.preventDefault();
          return;
        }
        showSlide(index);
      });
    });

    slides = Array.from(document.querySelectorAll('.slide'));
    thumbs = Array.from(document.querySelectorAll('.thumb'));

    if (!slides.length) {
      statusEl.textContent = 'No items in JSON.';
    } else {
      statusEl.textContent = `Loaded ${slides.length} image(s).`;
      adjustThumbScrollToCurrent();
    }
  }

  function updateActiveStates() {
    slides.forEach((s, i) => {
      s.classList.toggle('active', i === current);
    });
    thumbs.forEach((t, i) => {
      t.classList.toggle('active', i === current);
    });
  }

  function showSlide(index) {
    if (!slides.length) return;
    current = (index + slides.length) % slides.length;
    updateActiveStates();
    adjustThumbScrollToCurrent();
  }

  function adjustThumbScrollToCurrent() {
    if (!thumbs.length) return;
    const containerRect = thumbsContainer.getBoundingClientRect();
    const activeThumb = thumbs[current];
    const thumbRect = activeThumb.getBoundingClientRect();

    if (thumbRect.left < containerRect.left + 10) {
      thumbOffset += (containerRect.left + 10 - thumbRect.left);
    } else if (thumbRect.right > containerRect.right - 10) {
      thumbOffset -= (thumbRect.right - (containerRect.right - 10));
    }

    clampThumbOffset();
    thumbTrack.style.transform = `translateX(${thumbOffset}px)`;
  }

  function clampThumbOffset() {
    const maxOffset = 0;
    const minOffset = -(thumbTrack.scrollWidth - thumbsContainer.clientWidth);
    thumbOffset = Math.max(minOffset, Math.min(maxOffset, thumbOffset));
  }

  function scrollThumbs(deltaX) {
    thumbOffset -= deltaX * 1.2; // Slightly more sensitive
    clampThumbOffset();
    thumbTrack.style.transform = `translateX(${thumbOffset}px)`;
  }

  // mouse drag
  thumbsContainer.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startOffset = thumbOffset;
    thumbsContainer.style.cursor = 'grabbing';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - startX;
    thumbOffset = startOffset + deltaX;
    clampThumbOffset();
    thumbTrack.style.transform = `translateX(${thumbOffset}px)`;
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      thumbsContainer.style.cursor = 'grab';
    }
  });

  thumbsContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    clearTimeout(wheelTimeout);
    const delta = e.deltaX || -e.deltaY;
    if (Math.abs(delta) > 30) {
      // auto-advance main image
      if (delta > 0) {
        showSlide(current + 1);
      } else {
        showSlide(current - 1);
      }
    } else {
      scrollThumbs(delta);
    }

    // debounce rapid wheel events
    wheelTimeout = setTimeout(() => {
      adjustThumbScrollToCurrent();
    }, 150);
  }, { passive: false });

  // touch support
  let touchStartX = 0;
  thumbsContainer.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    isDragging = true;
  });

  thumbsContainer.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    const deltaX = e.touches[0].clientX - touchStartX;
    scrollThumbs(-deltaX * 1.5);
  }, { passive: false });

  thumbsContainer.addEventListener('touchend', () => {
    isDragging = false;
  });

  loadBtn.addEventListener('click', () => {
    statusEl.textContent = 'Loading gallery/local.json...';
    fetch('gallery/local.json')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(data => {
        if (!Array.isArray(data)) throw new Error('JSON must be an array');
        buildUI(data);
      })
      .catch(err => {
        statusEl.textContent = 'Error: ' + err.message;
      });
  });

  nextBtn.addEventListener('click', () => showSlide(current + 1));
  prevBtn.addEventListener('click', () => showSlide(current - 1));
  thumbNextBtn.addEventListener('click', () => scrollThumbs(-thumbsContainer.clientWidth * 0.7));
  thumbPrevBtn.addEventListener('click', () => scrollThumbs(thumbsContainer.clientWidth * 0.7));

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') showSlide(current + 1);
    if (e.key === 'ArrowLeft') showSlide(current - 1);
  });
</script>

</body>
</html>
