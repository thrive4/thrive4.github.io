<body>

  <script type="text/javascript" src="js/mdmhtlib.js" defer></script>
  <div class="docbody">
    <textarea id="mdinput" class="doctextarea" placeholder="Paste your Markdown content here..."></textarea><br/>

      <button class="docbutton" id="loadbtn">load markdown</button>

      <h3>MHT Viewer</h3>

      <div id="tocmodal-toggle"><span id="toggle-symbol">+</span></div>
