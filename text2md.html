<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8" />
    <meta name="keywords"    content="" />
    <title>documentconverter</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.jpg">
    <link rel="stylesheet" href="main.css" />
</head>
<body>
<p id="wah"></p>
<script type="text/javascript" src="js/body.js" defer></script>
<div class="docbody">
  <label for="input-text">Plain Text Input:</label>
  <textarea class="doctextarea" id="input-text" placeholder="Paste your plain text here...">
  </textarea>

  <script>
      if (window.localStorage.getItem('pagedata') !== null) {
         document.getElementById('input-text').innerHTML = window.localStorage.getItem('pagedata');
      }
  </script>
  <br><br>
  <button class="docbutton" id="convert-btn">Convert to Markdown</button>
  <br><br>
  <label for="markdown-output">Converted Markdown Output:</label>
  <textarea class="doctextarea" id="markdown-output" readonly placeholder="Converted Markdown will appear here..."></textarea>
  <div id="output">loaded stopwords (en)</div>
  <br>
  <button class="docbutton" id="download-pdf-btn">Download as PDF</button>
  <button class="docbutton" id="download-md-btn">Download as MD</button>

  <script>
    document.getElementById('convert-btn').addEventListener('click', () => {
      inittext2md();
    });
    document.getElementById('download-md-btn').addEventListener('click', () => {
       initmddownload();
    });
    document.getElementById('download-pdf-btn').addEventListener('click', () => {
       initpdfdownload();
    });
  </script>
</div>
</body>
</html>
